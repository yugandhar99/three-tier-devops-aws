services:
  frontend:
    build:
      context: frontend
      target: dev
    env_file: ./frontend/.env.dev.sample
    ports:
      - "4200:4200"
    stdin_open: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - backendfrontend-net
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: backend
      target: dev
    env_file: ./backend/.env.dev.sample
    ports:
      - "8080:8080"
    volumes:
      - ~/.m2:/root/.m2
    networks:
      - backenddb-net
      - backendfrontend-net
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    env_file: ./db/.env.dev.sample
    networks:
      - backenddb-net
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plocal_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backendfrontend-net:
  backenddb-net:

volumes:
  db-data:
