name: Terraform Drift Detection

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * 1'

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select prod || terraform workspace new prod

      - name: Terraform plan detailed exit code
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -var-file=envs/prod.tfvars > drift-plan.txt
          code=$?
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "1" ]; then
            cat drift-plan.txt
            exit 1
          fi
          exit 0
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Upload drift plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-drift-plan
          path: infra/drift-plan.txt

      - name: Open issue when drift is detected
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('infra/drift-plan.txt', 'utf8').slice(0, 60000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Terraform Drift Detected',
              body: `Terraform detected drift in production. Review the attached workflow artifact.\n\n\`\`\`terraform\n${body}\n\`\`\``
            });
