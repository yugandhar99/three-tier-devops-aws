services:
  frontend: 
    build:
      context: frontend
      target: prod
    env_file: ./frontend/.env.prod.sample
    ports:
      - "4200:4200"
    networks:
      - backendfrontend-net
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: backend
      target: prod
    env_file: ./backend/.env.prod.sample
    ports:
      - "8080:8080"
    networks:
      - backenddb-net
      - backendfrontend-net
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    env_file: ./db/.env.prod.sample
    networks:
      - backenddb-net
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plocal_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backendfrontend-net:
  backenddb-net:

volumes:
  db-data:
