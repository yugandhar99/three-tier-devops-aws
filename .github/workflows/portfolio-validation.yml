name: Portfolio Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate Portfolio Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "Checking required project files..."

          test -f README.md || (echo "README.md is missing" && exit 1)
          test -f .gitignore || (echo ".gitignore is missing" && exit 1)

          echo "Required files are present."

      - name: Check project folders
        run: |
          echo "Checking project structure..."

          ls -la

          echo "Project structure check completed."

      - name: Validate README presence
        run: |
          echo "README validation started..."

          if grep -q "Connect With Me" README.md; then
            echo "Contact footer found in README."
          else
            echo "Contact footer not found, but this is not blocking."
          fi

          echo "README validation completed."

      - name: Final status
        run: |
          echo "Portfolio validation completed successfully."
